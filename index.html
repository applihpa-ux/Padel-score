<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>PadelSync Score</title>

<style>
:root{--bg:#000;--fg:#fff;--muted:rgba(255,255,255,.6);}
html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
.wrap{height:100%;display:flex;flex-direction:column;padding:16px;gap:14px;box-sizing:border-box;}
.main{flex:1;display:grid;grid-template-columns:1fr 180px 1fr;gap:14px;}
.side{border:1px solid rgba(255,255,255,.18);border-radius:22px;display:flex;align-items:center;justify-content:center;position:relative;}
.side.red{border-color:rgba(255,0,0,.35);}
.side.blue{border-color:rgba(0,140,255,.35);}
.score{font-size:clamp(90px,18vw,200px);font-weight:900;}
.center{border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:14px;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center;}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card{border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:10px;}
.v{font-size:26px;font-weight:900;}
.serveBall{width:22px;height:22px;border-radius:50%;opacity:0;transition:.15s;}
.serveBall.on{opacity:1;}
.serveBall.red{background:rgba(255,0,0,.6);}
.serveBall.blue{background:rgba(0,140,255,.6);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;}
.panel{border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:20px;text-align:center;}
button{background:transparent;color:white;border:1px solid rgba(255,255,255,.3);padding:10px 14px;border-radius:10px;margin:5px;}
</style>
</head>

<body>
<div class="wrap">
<div class="main">

<div class="side red" id="tapRed">
<div class="serveBall red" id="serveRed"></div>
<div class="score" id="scoreRed">0</div>
</div>

<div class="center" id="centerTap">
<div id="modeLine">Normal</div>
<div class="kv">
<div class="card"><div>Sets</div><div class="v" id="setsLine">0 - 0</div></div>
<div class="card"><div>Jeux</div><div class="v" id="gamesLine">0 - 0</div></div>
</div>
</div>

<div class="side blue" id="tapBlue">
<div class="score" id="scoreBlue">0</div>
<div class="serveBall blue" id="serveBlue"></div>
</div>

</div>
</div>

<div class="overlay" id="overlay">
<div class="panel">
<p>Qui sert en premier ?</p>
<button onclick="pickService('r')">Rouge</button>
<button onclick="pickService('b')">Bleu</button>
<button onclick="pickService()">Aléatoire</button>
</div>
</div>

<script>
const LABELS=['0','15','30','40'];

const STATE={
mode:'normal',
sets:{r:0,b:0},
games:{r:0,b:0},
points:{r:0,b:0},
adv:null,
serve:null,
history:[]
};

const el={
r:scoreRed,
b:scoreBlue,
sets:setsLine,
games:gamesLine,
serveR:serveRed,
serveB:serveBlue,
mode:modeLine,
overlay:overlay
};

function speak(text,delay=300){
if(!('speechSynthesis'in window))return;
setTimeout(()=>{
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang='fr-FR';
u.rate=1.05;
speechSynthesis.speak(u);
},delay);
}

function snapshot(){
STATE.history.push(JSON.parse(JSON.stringify(STATE)));
if(STATE.history.length>100)STATE.history.shift();
}

function undo(){
if(!STATE.history.length)return;
Object.assign(STATE,STATE.history.pop());
render();
}

function pickService(t){
STATE.serve=t??(Math.random()<0.5?'r':'b');
el.overlay.style.display='none';
speak('Service '+(STATE.serve==='r'?'rouge':'bleu'),100);
render();
}

function spokenScore(){
const s=STATE.serve;
const o=s==='r'?'b':'r';

if(STATE.mode==='tiebreak')
return STATE.points[s]+' '+STATE.points[o];

if(STATE.points.r===3&&STATE.points.b===3){
if(STATE.adv===s)return 'Avantage '+(s==='r'?'rouge':'bleu');
if(STATE.adv===o)return 'Avantage '+(o==='r'?'rouge':'bleu');
return 'Égalité';
}
return LABELS[STATE.points[s]]+' '+LABELS[STATE.points[o]];
}

function announceFull(){
const s=STATE.serve;
const o=s==='r'?'b':'r';
speak(
spokenScore()+
' pour l équipe '+(s==='r'?'rouge':'bleu')+
' au service, '+
STATE.games[s]+' jeux à '+STATE.games[o]+
', '+STATE.sets[s]+' sets à '+STATE.sets[o],
100);
}

function addPoint(team){
if(!STATE.serve)return;
snapshot();

if(STATE.mode==='tiebreak'){
STATE.points[team]++;
render();
speak(spokenScore());
checkTB();
return;
}

const o=team==='r'?'b':'r';

if(STATE.points.r===3&&STATE.points.b===3){
if(!STATE.adv){STATE.adv=team;render();speak(spokenScore());return;}
if(STATE.adv===team){winGame(team);return;}
if(STATE.adv===o){STATE.adv=null;render();speak(spokenScore());return;}
}

if(STATE.points[team]<3){STATE.points[team]++;render();speak(spokenScore());return;}
if(STATE.points[team]===3&&STATE.points[o]<3){winGame(team);}
}

function winGame(team){
STATE.games[team]++;
STATE.points={r:0,b:0};
STATE.adv=null;

speak('Jeu '+(team==='r'?'rouge':'bleu'));

const total=STATE.games.r+STATE.games.b;
if(total%2===1)speak('Changement de côté',900);

STATE.serve=STATE.serve==='r'?'b':'r';

if(STATE.games.r===6&&STATE.games.b===6){
STATE.mode='tiebreak';
STATE.points={r:0,b:0};
speak('Tie break');
render();
return;
}

if(STATE.games[team]>=6&&Math.abs(STATE.games.r-STATE.games.b)>=2){
STATE.sets[team]++;
STATE.games={r:0,b:0};
speak('Set '+(team==='r'?'rouge':'bleu'));
}

render();
}

function checkTB(){
const r=STATE.points.r,b=STATE.points.b;
if((r>=7||b>=7)&&Math.abs(r-b)>=2){
winSet(r>b?'r':'b');
}
}

function winSet(team){
STATE.sets[team]++;
STATE.games={r:0,b:0};
STATE.points={r:0,b:0};
STATE.mode='normal';
speak('Set '+(team==='r'?'rouge':'bleu'));
render();
}

function render(){
el.r.textContent=STATE.mode==='tiebreak'?STATE.points.r:LABELS[STATE.points.r];
el.b.textContent=STATE.mode==='tiebreak'?STATE.points.b:LABELS[STATE.points.b];
el.sets.textContent=STATE.sets.r+' - '+STATE.sets.b;
el.games.textContent=STATE.games.r+' - '+STATE.games.b;
el.serveR.classList.toggle('on',STATE.serve==='r');
el.serveB.classList.toggle('on',STATE.serve==='b');
el.mode.textContent=STATE.mode==='tiebreak'?'Tie-break':'Normal';
}

tapRed.onclick=()=>addPoint('r');
tapBlue.onclick=()=>addPoint('b');

let last=0;
centerTap.onclick=()=>{
const t=Date.now();
if(t-last<350)announceFull();
last=t;
};

render();
</script>
</body>
</html>
