```html
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>PadelSync</title>

<style>
:root{
--bg:#f5f5f7;
--card:#ffffff;
--fg:#111111;
--muted:#8e8e93;
--red:#ff3b30;
--blue:#007aff;
}

html,body{
height:100%;
margin:0;
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:var(--fg);
}

.wrap{
height:100%;
display:flex;
flex-direction:column;
padding:20px;
gap:18px;
box-sizing:border-box;
}

.main{
flex:1;
display:grid;
grid-template-columns:1fr 220px 1fr;
gap:18px;
}

.side{
background:var(--card);
border-radius:34px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
box-shadow:0 8px 30px rgba(0,0,0,.08);
}

.side.red{outline:3px solid rgba(255,59,48,.4);}
.side.blue{outline:3px solid rgba(0,122,255,.4);}

.score{
font-size:clamp(90px,18vw,200px);
font-weight:900;
letter-spacing:-.04em;
}

.serveBall{
position:absolute;
top:20px;
width:18px;
height:18px;
border-radius:50%;
opacity:0;
transition:.2s;
}

.serveBall.red{background:var(--red);}
.serveBall.blue{background:var(--blue);}
.serveBall.on{opacity:1;}

.center{
background:var(--card);
border-radius:40px;
padding:30px 20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:30px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
}

.mode{
font-size:12px;
font-weight:700;
letter-spacing:.15em;
text-transform:uppercase;
color:var(--muted);
background:#f0f0f3;
padding:6px 14px;
border-radius:999px;
}

.gamesBlock{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.gamesScore{
font-size:56px;
font-weight:900;
letter-spacing:-.05em;
}

.gamesLabel{
font-size:12px;
letter-spacing:.2em;
color:var(--muted);
}

.setsBlock{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
opacity:.7;
}

.setsScore{
font-size:22px;
font-weight:800;
}

.setsLabel{
font-size:11px;
letter-spacing:.2em;
color:var(--muted);
}

.footer{
display:flex;
justify-content:center;
gap:20px;
}

button{
background:var(--card);
border:none;
padding:12px 22px;
border-radius:16px;
font-weight:600;
box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.overlay{
position:fixed;
inset:0;
background:rgba(255,255,255,.95);
display:flex;
align-items:center;
justify-content:center;
}

.panel{
background:white;
padding:30px;
border-radius:30px;
box-shadow:0 10px 40px rgba(0,0,0,.1);
text-align:center;
}

.panel button{
margin:8px;
}
</style>
</head>

<body tabindex="0">

<div class="wrap">
<div class="main">

<div class="side red" id="tapRed">
<div class="serveBall red" id="serveRed"></div>
<div class="score" id="scoreRed">0</div>
</div>

<div class="center" id="centerTap">
<div class="mode" id="modeLine">Normal</div>

<div class="gamesBlock">
<div class="gamesScore" id="gamesLine">0 - 0</div>
<div class="gamesLabel">JEUX</div>
</div>

<div class="setsBlock">
<div class="setsScore" id="setsLine">0 - 0</div>
<div class="setsLabel">SETS</div>
</div>
</div>

<div class="side blue" id="tapBlue">
<div class="serveBall blue" id="serveBlue"></div>
<div class="score" id="scoreBlue">0</div>
</div>

</div>

<div class="footer">
<button onclick="undo()">Undo</button>
<button onclick="resetMatch()">Reset</button>
</div>
</div>

<div class="overlay" id="overlay">
<div class="panel">
<p>Qui sert en premier ?</p>
<button onclick="pickService('r')">Rouge</button>
<button onclick="pickService('b')">Bleu</button>
<button onclick="pickService()">Aléatoire</button>
</div>
</div>

<script>

const LABELS=['0','15','30','40'];

const STATE={
mode:'normal',
sets:{r:0,b:0},
games:{r:0,b:0},
points:{r:0,b:0},
adv:null,
serve:null,
history:[]
};

function speak(text,delay=300){
if(!('speechSynthesis'in window))return;
setTimeout(()=>{
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang='fr-FR';
u.rate=1.05;
speechSynthesis.speak(u);
},delay);
}

function snapshot(){
STATE.history.push(JSON.parse(JSON.stringify({
mode:STATE.mode,
sets:STATE.sets,
games:STATE.games,
points:STATE.points,
adv:STATE.adv,
serve:STATE.serve
})));
}

function undo(){
if(!STATE.history.length)return;
const prev=STATE.history.pop();
STATE.mode=prev.mode;
STATE.sets=prev.sets;
STATE.games=prev.games;
STATE.points=prev.points;
STATE.adv=prev.adv;
STATE.serve=prev.serve;
render();
}

function resetMatch(){
if(!confirm("Reset match ?"))return;
STATE.mode='normal';
STATE.sets={r:0,b:0};
STATE.games={r:0,b:0};
STATE.points={r:0,b:0};
STATE.adv=null;
STATE.serve=null;
STATE.history=[];
overlay.style.display='flex';
render();
}

function pickService(t){
STATE.serve=t??(Math.random()<0.5?'r':'b');
overlay.style.display='none';
speak('Service '+(STATE.serve==='r'?'rouge':'bleu'));
render();
}

function spokenScore(){
const s=STATE.serve;
const o=s==='r'?'b':'r';

if(STATE.mode==='tiebreak')
return STATE.points[s]+' '+STATE.points[o];

if(STATE.points.r===3&&STATE.points.b===3){
if(STATE.adv===s)return 'Avantage '+(s==='r'?'rouge':'bleu');
if(STATE.adv===o)return 'Avantage '+(o==='r'?'rouge':'bleu');
return 'Égalité';
}

return LABELS[STATE.points[s]]+' '+LABELS[STATE.points[o]];
}

function announceFull(){
const s=STATE.serve;
const o=s==='r'?'b':'r';

speak(
spokenScore()+
' pour équipe '+(s==='r'?'rouge':'bleu')+
', '+STATE.games[s]+' jeux à '+STATE.games[o]+
', '+STATE.sets[s]+' sets à '+STATE.sets[o]
);
}

function addPoint(team){

if(!STATE.serve)return;

snapshot();

if(STATE.mode==='tiebreak'){
STATE.points[team]++;
render();
speak(spokenScore());
checkTB();
return;
}

const o=team==='r'?'b':'r';

if(STATE.points.r===3&&STATE.points.b===3){

if(!STATE.adv){
STATE.adv=team;
render();
speak(spokenScore());
return;
}

if(STATE.adv===team){
winGame(team);
return;
}

if(STATE.adv===o){
STATE.adv=null;
render();
speak(spokenScore());
return;
}
}

if(STATE.points[team]<3){
STATE.points[team]++;
render();
speak(spokenScore());
return;
}

if(STATE.points[team]===3&&STATE.points[o]<3){
winGame(team);
}
}

function winGame(team){

STATE.games[team]++;
STATE.points={r:0,b:0};
STATE.adv=null;

const total=STATE.games.r+STATE.games.b;

STATE.serve=STATE.serve==='r'?'b':'r';

const serviceTeam=STATE.serve==='r'?'rouge':'bleu';

speak(
STATE.games.r+' jeu'+(STATE.games.r>1?'x':'')+
' à '+STATE.games.b+
', service équipe '+serviceTeam
);

if(total%2===1)speak('Changement de côté',900);

if(STATE.games.r===6&&STATE.games.b===6){
STATE.mode='tiebreak';
STATE.points={r:0,b:0};
speak('Tie break');
render();
return;
}

if(STATE.games[team]>=6&&Math.abs(STATE.games.r-STATE.games.b)>=2){
STATE.sets[team]++;
STATE.games={r:0,b:0};
speak('Set '+(team==='r'?'rouge':'bleu'));
}

render();
}

function checkTB(){
const r=STATE.points.r;
const b=STATE.points.b;

if((r>=7||b>=7)&&Math.abs(r-b)>=2){
STATE.sets[r>b?'r':'b']++;
STATE.games={r:0,b:0};
STATE.points={r:0,b:0};
STATE.mode='normal';
speak('Set');
render();
}
}

function render(){
scoreRed.textContent=STATE.mode==='tiebreak'?STATE.points.r:LABELS[STATE.points.r];
scoreBlue.textContent=STATE.mode==='tiebreak'?STATE.points.b:LABELS[STATE.points.b];
setsLine.textContent=STATE.sets.r+' - '+STATE.sets.b;
gamesLine.textContent=STATE.games.r+' - '+STATE.games.b;
serveRed.classList.toggle('on',STATE.serve==='r');
serveBlue.classList.toggle('on',STATE.serve==='b');
modeLine.textContent=STATE.mode==='tiebreak'?'Tie-break':'Normal';
}

tapRed.onclick=()=>addPoint('r');
tapBlue.onclick=()=>addPoint('b');

let last=0;

centerTap.onclick=()=>{
const t=Date.now();
if(t-last<350)announceFull();
last=t;
};

document.addEventListener("keydown",function(e){

if(e.key==="r"||e.key==="R") addPoint('r');
if(e.key==="b"||e.key==="B") addPoint('b');
if(e.key==="u"||e.key==="U") undo();
if(e.key==="s"||e.key==="S") announceFull();

});

document.body.focus();

render();

</script>

</body>
</html>
