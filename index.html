<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>PadelSync Score</title>

<style>
:root{
--bg:#ffffff;
--fg:#111111;
--muted:rgba(0,0,0,.55);
}

html,body{
height:100%;
margin:0;
background:var(--bg);
color:var(--fg);
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

.wrap{
height:100%;
display:flex;
flex-direction:column;
padding:16px;
gap:14px;
box-sizing:border-box;
}

.main{
flex:1;
display:grid;
grid-template-columns:1fr 180px 1fr;
gap:14px;
}

.side{
border:2px solid rgba(0,0,0,.15);
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.side.red{border-color:rgba(255,0,0,.5);}
.side.blue{border-color:rgba(0,120,255,.5);}

.score{
font-size:clamp(90px,18vw,200px);
font-weight:900;
}

.center{
border:2px solid rgba(0,0,0,.15);
border-radius:22px;
padding:14px;
display:flex;
flex-direction:column;
justify-content:center;
gap:14px;
text-align:center;
}

.kv{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
border:1px solid rgba(0,0,0,.2);
border-radius:16px;
padding:10px;
}

.v{
font-size:26px;
font-weight:900;
}

.serveBall{
width:22px;
height:22px;
border-radius:50%;
opacity:0;
transition:.15s;
position:absolute;
left:10px;
}

.serveBall.on{opacity:1;}
.serveBall.red{background:red;}
.serveBall.blue{background:#0078ff;}

.footer{
display:flex;
justify-content:center;
gap:20px;
}

button{
background:#f2f2f2;
border:1px solid rgba(0,0,0,.2);
padding:10px 20px;
border-radius:12px;
font-weight:600;
}

.overlay{
position:fixed;
inset:0;
background:rgba(255,255,255,.95);
display:flex;
align-items:center;
justify-content:center;
}

.panel{
border:1px solid rgba(0,0,0,.2);
border-radius:20px;
padding:20px;
text-align:center;
background:white;
}
</style>
</head>

<body>

<div class="wrap">

<div class="main">

<div class="side red" id="tapRed">
<div class="serveBall red" id="serveRed"></div>
<div class="score" id="scoreRed">0</div>
</div>

<div class="center" id="centerTap">
<div id="modeLine">Normal</div>
<div class="kv">
<div class="card"><div>Sets</div><div class="v" id="setsLine">0 - 0</div></div>
<div class="card"><div>Jeux</div><div class="v" id="gamesLine">0 - 0</div></div>
</div>
</div>

<div class="side blue" id="tapBlue">
<div class="serveBall blue" id="serveBlue"></div>
<div class="score" id="scoreBlue">0</div>
</div>

</div>

<div class="footer">
<button onclick="undo()">Undo</button>
<button onclick="resetMatch()">Reset</button>
</div>

</div>

<div class="overlay" id="overlay">
<div class="panel">
<p>Qui sert en premier ?</p>
<button onclick="pickService('r')">Rouge</button>
<button onclick="pickService('b')">Bleu</button>
<button onclick="pickService()">Aléatoire</button>
</div>
</div>

<script>
const LABELS=['0','15','30','40'];

const STATE={
mode:'normal',
sets:{r:0,b:0},
games:{r:0,b:0},
points:{r:0,b:0},
adv:null,
serve:null,
history:[]
};

function speak(text,delay=300){
if(!('speechSynthesis'in window))return;
setTimeout(()=>{
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang='fr-FR';
u.rate=1.05;
speechSynthesis.speak(u);
},delay);
}

function snapshot(){
STATE.history.push(JSON.parse(JSON.stringify({
mode:STATE.mode,
sets:STATE.sets,
games:STATE.games,
points:STATE.points,
adv:STATE.adv,
serve:STATE.serve
})));
}

function undo(){
if(!STATE.history.length)return;
const prev=STATE.history.pop();
Object.assign(STATE,prev);
render();
}

function resetMatch(){
if(!confirm("Reset match ?"))return;
STATE.mode='normal';
STATE.sets={r:0,b:0};
STATE.games={r:0,b:0};
STATE.points={r:0,b:0};
STATE.adv=null;
STATE.serve=null;
STATE.history=[];
overlay.style.display='flex';
render();
}

function pickService(t){
STATE.serve=t??(Math.random()<0.5?'r':'b');
overlay.style.display='none';
speak('Service '+(STATE.serve==='r'?'rouge':'bleu'),100);
render();
}

function spokenScore(){
const s=STATE.serve;
const o=s==='r'?'b':'r';

if(STATE.mode==='tiebreak')
return STATE.points[s]+' '+STATE.points[o];

if(STATE.points.r===3&&STATE.points.b===3){
if(STATE.adv===s)return 'Avantage '+(s==='r'?'rouge':'bleu');
if(STATE.adv===o)return 'Avantage '+(o==='r'?'rouge':'bleu');
return 'Égalité';
}
return LABELS[STATE.points[s]]+' '+LABELS[STATE.points[o]];
}

function announceFull(){
const s=STATE.serve;
const o=s==='r'?'b':'r';
speak(spokenScore()+
' pour l équipe '+(s==='r'?'rouge':'bleu')+
', '+STATE.games[s]+' jeux à '+STATE.games[o]+
', '+STATE.sets[s]+' sets à '+STATE.sets[o],100);
}

function addPoint(team){
if(!STATE.serve)return;
snapshot();

if(STATE.mode==='tiebreak'){
STATE.points[team]++;
render();
speak(spokenScore());
checkTB();
return;
}

const o=team==='r'?'b':'r';

if(STATE.points.r===3&&STATE.points.b===3){
if(!STATE.adv){STATE.adv=team;render();speak(spokenScore());return;}
if(STATE.adv===team){winGame(team);return;}
if(STATE.adv===o){STATE.adv=null;render();speak(spokenScore());return;}
}

if(STATE.points[team]<3){STATE.points[team]++;render();speak(spokenScore());return;}
if(STATE.points[team]===3&&STATE.points[o]<3){winGame(team);}
}

function winGame(team){
STATE.games[team]++;
STATE.points={r:0,b:0};
STATE.adv=null;

speak('Jeu '+(team==='r'?'rouge':'bleu'));

const total=STATE.games.r+STATE.games.b;
if(total%2===1)speak('Changement de côté',900);

STATE.serve=STATE.serve==='r'?'b':'r';

if(STATE.games.r===6&&STATE.games.b===6){
STATE.mode='tiebreak';
STATE.points={r:0,b:0};
speak('Tie break');
render();
return;
}

if(STATE.games[team]>=6&&Math.abs(STATE.games.r-STATE.games.b)>=2){
STATE.sets[team]++;
STATE.games={r:0,b:0};
speak('Set '+(team==='r'?'rouge':'bleu'));
}

render();
}

function checkTB(){
const r=STATE.points.r,b=STATE.points.b;
if((r>=7||b>=7)&&Math.abs(r-b)>=2){
STATE.sets[r>b?'r':'b']++;
STATE.games={r:0,b:0};
STATE.points={r:0,b:0};
STATE.mode='normal';
speak('Set');
render();
}
}

function render(){
scoreRed.textContent=STATE.mode==='tiebreak'?STATE.points.r:LABELS[STATE.points.r];
scoreBlue.textContent=STATE.mode==='tiebreak'?STATE.points.b:LABELS[STATE.points.b];
setsLine.textContent=STATE.sets.r+' - '+STATE.sets.b;
gamesLine.textContent=STATE.games.r+' - '+STATE.games.b;
serveRed.classList.toggle('on',STATE.serve==='r');
serveBlue.classList.toggle('on',STATE.serve==='b');
modeLine.textContent=STATE.mode==='tiebreak'?'Tie-break':'Normal';
}

tapRed.onclick=()=>addPoint('r');
tapBlue.onclick=()=>addPoint('b');

let last=0;
centerTap.onclick=()=>{
const t=Date.now();
if(t-last<350)announceFull();
last=t;
};

render();
</script>

</body>
</html>
